<!DOCTYPE html>
<html>
<head>
    <title>Create Test Community Products</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Create Test Community Products</h1>
    <p>Click the button below to create test products for the Community Marketplace section.</p>
    
    <button onclick="createTestProducts()">Create Test Products</button>
    
    <div id="result"></div>

    <script>
        async function createTestProducts() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Creating test products...</p>';
            
            try {
                const response = await fetch('/api/test/create-community-products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>Success!</h3>
                            <p>${data.message}</p>
                            ${data.products ? `
                                <h4>Created Products:</h4>
                                <ul>
                                    ${data.products.map(p => `<li>${p.name} - Ksh ${p.price.toLocaleString()}</li>`).join('')}
                                </ul>
                            ` : ''}
                            <p><strong>Now refresh the homepage to see the Community Marketplace section with products!</strong></p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>Error</h3>
                            <p>${data.error || 'Failed to create test products'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>Network Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
