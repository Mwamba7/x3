<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Withdrawals</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .danger { background: #dc3545; }
        .danger:hover { background: #c82333; }
        .success { background: #28a745; }
        .success:hover { background: #218838; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 4px; overflow-x: auto; }
        .form-group { margin: 15px 0; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Withdrawal Debug Tool</h1>
        
        <div class="form-group">
            <h3>Check Withdrawal Requests</h3>
            <button onclick="checkWithdrawals()">📋 Check All Withdrawal Requests</button>
            <button onclick="clearAllWithdrawals()" class="danger">🗑️ Clear All Withdrawal Requests</button>
        </div>
        
        <div class="form-group">
            <h3>Reset Product Withdrawal Status</h3>
            <input type="text" id="productId" placeholder="Enter Product ID">
            <button onclick="resetProductWithdrawal()" class="success">🔄 Reset Product</button>
        </div>
        
        <div id="output"></div>
    </div>

    <script>
        async function checkWithdrawals() {
            try {
                const response = await fetch('/api/debug/withdrawals')
                const data = await response.json()
                
                document.getElementById('output').innerHTML = `
                    <h3>📊 Withdrawal Requests (${data.count})</h3>
                    <pre>${JSON.stringify(data.withdrawalRequests, null, 2)}</pre>
                `
            } catch (error) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`
            }
        }
        
        async function clearAllWithdrawals() {
            if (!confirm('Are you sure you want to clear ALL withdrawal requests? This cannot be undone.')) {
                return
            }
            
            try {
                const response = await fetch('/api/debug/withdrawals', { method: 'DELETE' })
                const data = await response.json()
                
                document.getElementById('output').innerHTML = `
                    <h3>✅ Success</h3>
                    <p>${data.message}</p>
                `
            } catch (error) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`
            }
        }
        
        async function resetProductWithdrawal() {
            const productId = document.getElementById('productId').value.trim()
            
            if (!productId) {
                alert('Please enter a Product ID')
                return
            }
            
            try {
                const response = await fetch('/api/debug/reset-withdrawal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId })
                })
                
                const data = await response.json()
                
                if (data.success) {
                    document.getElementById('output').innerHTML = `
                        <h3>✅ Success</h3>
                        <p>${data.message}</p>
                        <p>Product ID: ${productId}</p>
                    `
                } else {
                    document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${data.error}</p>`
                }
            } catch (error) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`
            }
        }
    </script>
</body>
</html>
