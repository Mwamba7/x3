<!DOCTYPE html>
<html>
<head>
    <title>Create Community Products</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Create Community Products</h1>
    <p>Click the button below to create test community products for the marketplace:</p>
    <button onclick="createProducts()">Create Test Products</button>
    <div id="result"></div>

    <script>
        async function createProducts() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Creating products...';
            
            try {
                const response = await fetch('/api/test/create-community-products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>Success!</h3>
                        <p>${data.message}</p>
                        <p>Created products:</p>
                        <ul>
                            ${data.products.map(p => `<li>${p.name} - Ksh ${p.price.toLocaleString()}</li>`).join('')}
                        </ul>
                        <p><a href="/">View Community Marketplace on main page</a></p>
                        <p><a href="/admin/community">View in Admin Panel</a></p>
                    `;
                } else {
                    throw new Error(data.error || 'Failed to create products');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<h3>Error</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
