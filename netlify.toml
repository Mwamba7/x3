[build]
  command = "npm run build"
  publish = ".next"

[functions]
  node_bundler = "esbuild"

[build.environment]
  # Ensure Prisma generates the correct native bindings for Netlify's Debian/OpenSSL 3 image
  PRISMA_CLI_BINARY_TARGETS = "debian-openssl-3.0.x"
  # Lock Node to the same version Netlify uses in logs (optional if set in UI)
  NODE_VERSION = "22.19.0"
